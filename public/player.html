<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>빙고 - 내 카드</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div><span class="dice">🎲</span> <span class="mark">Mega Bingo</span></div>
    <div class="tag">Party Game</div>
  </div>

  <!-- JOIN -->
  <div id="joinView" class="card">
    <h2>빙고 참가</h2>
    <label>방 코드</label>
    <input id="code" maxlength="4" autocapitalize="characters" style="text-transform:uppercase;" />
    <label>닉네임</label>
    <input id="name" maxlength="20" placeholder="이름" />
    <div style="height:12px"></div>
    <button class="go" id="joinBtn">참가하기 🚀</button>
  </div>

  <!-- WORDS collection -->
  <div id="wordsView" class="card hidden">
    <h2>단어 입력 ✍️</h2>
    <p class="muted" id="catLine"></p>
    <div id="wordInputs"></div>
    <div style="height:8px"></div>
    <button id="submitWords">제출하기</button>
    <p class="muted center" id="wordsStatus" style="margin-top:12px"></p>
  </div>

  <!-- LOBBY wait -->
  <div id="lobbyView" class="hidden">
    <div class="card center">
      <h2 id="lobbyName">대기 중…</h2>
      <p class="muted">👤 <b id="lobbyMyName"></b> 님, 환영합니다!</p>
      <div class="pill" id="lobbyCount">참가자 0명</div>
    </div>
    <div id="lobbyCard" class="card hidden">
      <div class="muted center" style="margin-bottom:8px">🎴 내 빙고판 — 마음에 들 때까지 다시 뽑으세요!</div>
      <div class="bingo-header"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
      <div class="board" id="previewBoard"></div>
      <div style="height:12px"></div>
      <button id="rerollBtn">🔀 다시 뽑기</button>
      <p class="muted center" style="font-size:12px;margin-top:8px">게임이 시작되면 이 판으로 확정됩니다.</p>
    </div>
    <div class="card center">
      <p class="muted" style="margin:0">호스트가 시작하면 게임이 진행됩니다 ⏳</p>
    </div>
  </div>

  <!-- GAME -->
  <div id="gameView" class="hidden">
    <div id="winBanner" class="banner hidden">🎉 빙고! 우승을 축하합니다!</div>
    <div id="reachBanner" class="reach-banner hidden">⚡ 리치! 한 칸 남았어요</div>
    <div id="turnBanner" class="turn-box hidden"></div>
    <div class="statline">
      <span class="pill">👤 <b id="myName"></b></span>
      <span class="pill">👥 <b id="playerCount">0</b>명</span>
      <span class="pill">완성 줄 <b id="myLines">0</b> / <b id="needLines">3</b></span>
    </div>
    <div class="card" style="padding:12px;">
      <div class="statline" style="margin:0 0 4px">
        <button id="pVoiceBtn" class="mini-toggle">🔊 음성</button>
        <span class="pill" id="countdownPill"><span id="cdLabel">다음 호출</span> <b id="countdown">–</b>초</span>
      </div>
      <div class="ball-stage">
        <div class="ball" id="ball"><span id="bigCall">–</span></div>
      </div>
    </div>
    <div id="bingoHeader" class="bingo-header hidden"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
    <div class="board" id="board"></div>
    <div class="card" style="margin-top:14px;">
      <div class="statline" style="margin:0 0 6px">
        <span class="muted" style="font-size:13px">🏆 실시간 현황</span>
        <span class="muted" style="font-size:13px">호출 <span id="calledCount">0</span></span>
      </div>
      <div id="miniBoard"></div>
    </div>
    <div class="card">
      <div class="muted" style="font-size:13px;margin-bottom:6px">호출된 항목</div>
      <div class="called-list" id="calledList"></div>
    </div>
    <div class="card" style="padding:12px;">
      <div class="muted" style="font-size:13px;margin-bottom:8px">반응 보내기 — 모두의 화면에 떠올라요!</div>
      <div class="emoji-bar" id="emojiBar">
        <button>👏</button><button>😂</button><button>🎉</button><button>😮</button>
        <button>🔥</button><button>❤️</button><button>😭</button><button>👍</button>
      </div>
    </div>
  </div>

  <div class="app-footer">made with <span class="heart">♥</span> by <b>GOGO STUDIO</b></div>
</div>

<div class="toast" id="toast"></div>
<div id="reactions" class="reactions-layer"></div>
<canvas id="confetti" style="position:fixed;inset:0;pointer-events:none;z-index:40;display:none"></canvas>

<script src="/sounds.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const $ = (id) => document.getElementById(id);
let state = { code: null, pid: null, name: '', mode: 'numbers', card: null, calledSet: new Set(), needLines: 3, intervalSec: 4, won: false, myTurn: false };

// restore pid per room
function pidKey(code){ return 'bingoPid:' + code; }

const params = new URLSearchParams(location.search);
if (params.get('code')) $('code').value = params.get('code').toUpperCase();
if (sessionStorage.getItem('bingoName')) $('name').value = sessionStorage.getItem('bingoName');

// auto-rejoin on page reload if we already have a saved session for this room
(function autoRejoin(){
  const code = ($('code').value || '').trim().toUpperCase();
  const name = ($('name').value || '').trim();
  if (code.length === 4 && name && localStorage.getItem(pidKey(code))) {
    setTimeout(doJoin, 100);
  }
})();

function show(view){
  ['joinView','wordsView','lobbyView','gameView'].forEach(v => $(v).classList.add('hidden'));
  $(view).classList.remove('hidden');
}
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

$('joinBtn').onclick = doJoin;
function doJoin(){
  const code = $('code').value.trim().toUpperCase();
  const name = $('name').value.trim();
  if (code.length !== 4) return alert('4자리 방 코드를 입력하세요.');
  if (!name) return alert('닉네임을 입력하세요.');
  state.code = code;
  if (window.Sound) Sound.unlock();
  if (window.Voice) Voice.prime(); // unlock speech within the tap gesture (esp. iOS)
  const savedPid = localStorage.getItem(pidKey(code)) || null;
  socket.emit('player:join', { code, name, pid: savedPid }, (res) => {
    if (!res || !res.ok) {
      if (res && res.error === 'in-progress') return alert('이미 게임이 진행 중입니다.');
      return alert('방을 찾을 수 없습니다. 코드를 확인하세요.');
    }
    state.pid = res.pid;
    state.name = name;
    state.mode = res.mode;
    state.needLines = res.settings.linesToWin;
    state.intervalSec = res.settings.intervalSec || 4;
    localStorage.setItem(pidKey(code), res.pid);
    sessionStorage.setItem('bingoName', name);
    $('needLines').textContent = res.settings.linesToWin;
    $('myName').textContent = name;
    $('lobbyMyName').textContent = name;
    applyServerState(res);
  });
}

function applyServerState(res){
  if (res.mode) state.mode = res.mode;
  if (res.card) { state.card = res.card; }
  if (res.settings) { state.intervalSec = res.settings.intervalSec || state.intervalSec; state.needLines = res.settings.linesToWin || state.needLines; }
  if (state.name) { $('myName').textContent = state.name; $('lobbyMyName').textContent = state.name; }
  $('needLines').textContent = state.needLines;
  state.calledSet = new Set((res.called || []).map(String));

  if (res.status === 'collecting' && res.mode === 'words') {
    renderWordInputs(res.settings.wordsPerPlayer, res.settings.category, res.submittedWords);
    show('wordsView');
  } else if (res.status === 'lobby' || (res.status === 'collecting')) {
    $('lobbyName').textContent = '시작 대기 중…';
    if (state.mode === 'numbers' && state.card) { renderPreview(); $('lobbyCard').classList.remove('hidden'); }
    else { $('lobbyCard').classList.add('hidden'); }
    show('lobbyView');
  } else if (res.status === 'playing' || res.status === 'ended') {
    if (state.card) { renderBoard(); show('gameView'); refreshCalled(res.called||[]); updateLines(res.lines||0, res.won); }
    else { show('lobbyView'); }
    if (res.winners && res.winners.length) showWinners(res.winners);
  }
}

// ---- words ----
function renderWordInputs(n, category, existing){
  $('catLine').textContent = category ? ('카테고리: ' + category) : '아래에 단어를 입력하세요.';
  const box = $('wordInputs'); box.innerHTML = '';
  for (let i=0;i<n;i++){
    const inp = document.createElement('input');
    inp.placeholder = `단어 ${i+1}`;
    inp.maxLength = 30;
    inp.style.marginBottom = '8px';
    if (existing && existing[i]) inp.value = existing[i];
    box.appendChild(inp);
  }
}
$('submitWords').onclick = () => {
  const words = [...$('wordInputs').querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);
  if (!words.length) return alert('단어를 하나 이상 입력하세요.');
  socket.emit('player:words', words, (res) => {
    if (res && res.ok) { toast('제출 완료! 다른 참가자를 기다려주세요.'); $('wordsStatus').textContent = '✅ 제출됨: ' + res.submittedWords.join(', '); }
  });
};

// ---- labels (official 75-ball: B 1-15, I 16-30, N 31-45, G 46-60, O 61-75) ----
function letterFor(v){
  if (state.mode !== 'numbers') return '';
  v = +v;
  if (v <= 15) return 'B'; if (v <= 30) return 'I'; if (v <= 45) return 'N'; if (v <= 60) return 'G'; return 'O';
}
function label(v){ const L = letterFor(v); return L ? (L + '-' + v) : v; }

// ---- voice (shared Voice module in sounds.js) ----
function sayCall(v){
  const L = letterFor(v);
  if (window.Voice) Voice.speak(L ? (L + ' ' + v + '... ' + L + ' ' + v) : String(v));
}
function setPVoice(on){
  if (window.Voice) Voice.enabled(on);
  $('pVoiceBtn').textContent = on ? '🔊 음성' : '🔇 음성';
  $('pVoiceBtn').classList.toggle('off', !on);
}
$('pVoiceBtn').onclick = () => setPVoice(window.Voice ? !Voice.enabled() : false);

// ---- ball drop (same as host) ----
const BALL_COLORS = { B:'#5b8cff', I:'#ff5e7e', N:'#2ecc71', G:'#ffb938', O:'#b07bff' };
function dropBall(v){
  const ball = $('ball'); if (!ball) return;
  ball.style.background = BALL_COLORS[letterFor(v)] || 'var(--gold)';
  $('bigCall').textContent = label(v);
  ball.classList.remove('drop'); void ball.offsetWidth; ball.classList.add('drop');
}

// ---- board ----
let daubed = new Set(); // values the player has tapped to mark (strings)
function cellState(div){
  const v = div.dataset.val;
  if (v === '★') return; // free center stays marked
  div.classList.remove('hot','daubed','callable');
  if (daubed.has(v)) div.classList.add('daubed');
  else if (state.calledSet.has(v)) div.classList.add('hot'); // called but not yet daubed → "tap me!"
  else if (state.mode === 'turns' && state.myTurn) div.classList.add('callable'); // my turn → tap to call
}
function renderBoard(){
  $('bingoHeader').classList.toggle('hidden', state.mode !== 'numbers');
  const b = $('board'); b.innerHTML = '';
  for (let r=0;r<5;r++) for (let c=0;c<5;c++){
    const v = String(state.card[r][c]);
    const div = document.createElement('div');
    div.dataset.val = v;
    if (v === '★') { div.className = 'cell free'; div.innerHTML = '<span>FREE</span>'; }
    else {
      div.className = 'cell';
      div.textContent = v;
      div.onclick = () => tryDaub(div);
      cellState(div);
    }
    b.appendChild(div);
  }
}
function tryDaub(div){
  const v = div.dataset.val;
  // turn-based mode: on my turn, tapping an uncalled cell CALLS that number for everyone
  if (state.mode === 'turns' && state.myTurn && v !== '★' && !state.calledSet.has(v)) {
    socket.emit('player:call', Number(v));
    state.myTurn = false; // optimistic lock to prevent double-tap
    document.querySelectorAll('#board .cell').forEach(cellState);
    return;
  }
  if (state.calledSet.has(v) && !daubed.has(v)) { daubed.add(v); cellState(div); if (window.Sound) Sound.daub(); }
  else if (!state.calledSet.has(v)) { div.animate([{transform:'translateX(-3px)'},{transform:'translateX(3px)'},{transform:'translateX(0)'}],{duration:160}); }
}
function refreshCalled(called){
  state.calledSet = new Set(called.map(String));
  $('calledCount').textContent = called.length;
  $('calledList').innerHTML = called.map(v=>`<span class="chip">${label(v)}</span>`).join('');
  if (state.card) document.querySelectorAll('#board .cell').forEach(cellState);
  if (called.length) $('bigCall').textContent = label(called[called.length-1]);
}
function updateLines(lines, won){
  $('myLines').textContent = lines;
  if (won && !state.won) {
    state.won = true;
    $('reachBanner').classList.add('hidden');
    $('winBanner').classList.remove('hidden');
    fireConfetti();
    if (window.Sound) Sound.win();
  }
}
function updateReach(reach, waiting){
  const banner = $('reachBanner');
  if (reach && !state.won) {
    const w = (waiting || []).slice(0, 4).map(label).join(', ');
    banner.innerHTML = '⚡ 리치! 이 번호만 나오면 빙고 → <b>' + (w || '') + '</b>';
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }
}

// ---- lobby card preview + re-roll ----
function renderPreview(){
  const b = $('previewBoard'); if (!b || !state.card) return;
  b.innerHTML = '';
  for (let r=0;r<5;r++) for (let c=0;c<5;c++){
    const v = String(state.card[r][c]);
    const div = document.createElement('div');
    div.className = 'cell' + (v === '★' ? ' free' : '');
    div.innerHTML = v === '★' ? '<span>FREE</span>' : v;
    b.appendChild(div);
  }
}
$('rerollBtn').onclick = () => {
  if (window.Sound) Sound.daub();
  socket.emit('player:reroll', (res) => {
    if (res && res.ok) {
      state.card = res.card; renderPreview();
      $('previewBoard').animate([{opacity:.25},{opacity:1}], {duration:260});
    }
  });
};

// ---- countdown ----
let countdown = 0, countdownTimer = null;
function startCountdown(sec, labelText){
  countdown = sec || state.intervalSec;
  $('cdLabel').textContent = labelText || '다음 호출';
  $('countdown').textContent = countdown;
  $('countdownPill').classList.remove('hidden');
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    $('countdown').textContent = countdown;
  }, 1000);
}
function stopCountdown(){ if (countdownTimer) clearInterval(countdownTimer); $('countdownPill').classList.add('hidden'); }

// ---- live leaderboard (players + their line counts) ----
function renderMiniBoard(players){
  if (!players) return;
  $('playerCount').textContent = players.length;
  $('lobbyCount').textContent = '참가자 ' + players.length + '명';
  const sorted = [...players].sort((a,b)=> (b.lines-a.lines) || a.name.localeCompare(b.name));
  $('miniBoard').innerHTML = sorted.map((p,i)=>{
    const me = p.pid === state.pid;
    const rank = p.won ? '🏆' : (i+1);
    return `<div class="lb-row" style="${me?'background:rgba(91,140,255,.15);border-radius:8px;':''}">
      <span style="width:22px;text-align:center">${rank}</span>
      <span class="dot ${p.online?'':'off'}"></span>
      <span class="lb-name">${escapeHtml(p.name)}${me?' <span class="muted">(나)</span>':''}${p.reach&&!p.won?' <span class="reach-badge">🔥</span>':''}</span>
      <span class="lb-lines">${p.lines}줄</span></div>`;
  }).join('') || '<p class="muted">참가자 없음</p>';
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- socket events ----
socket.on('room:update', (r) => {
  renderMiniBoard(r.players);
  if (r.status === 'ended') stopCountdown();
  // turn-based: sync my-turn state if we missed a game:turn (e.g. reconnect)
  if (r.mode === 'turns' && r.status === 'playing') {
    const nowMine = (r.currentPid === state.pid);
    if (nowMine !== state.myTurn) {
      state.myTurn = nowMine;
      const cur = r.players.find(p => p.pid === r.currentPid);
      updateTurnBanner(cur ? cur.name : '');
      document.querySelectorAll('#board .cell').forEach(cellState);
    }
  }
});
socket.on('player:card', (d) => { state.card = d.card; state.mode = d.mode; state.won = false; state.myTurn = false; daubed = new Set(); $('reachBanner').classList.add('hidden'); renderBoard(); show('gameView'); if (state.mode !== 'turns') startCountdown(state.intervalSec, '다음 호출'); });
socket.on('game:call', (d) => { refreshCalled(d.called); dropBall(d.value); if (state.mode !== 'turns') startCountdown(state.intervalSec, '다음 호출'); sayCall(d.value); });
socket.on('game:turn', (d) => {
  state.myTurn = (d.pid === state.pid);
  updateTurnBanner(d.name);
  document.querySelectorAll('#board .cell').forEach(cellState);
  startCountdown(d.turnSec, state.myTurn ? '내 차례' : '남은 시간');
  if (state.myTurn && window.Sound) Sound.reach();
});
function updateTurnBanner(name){
  const el = $('turnBanner');
  if (state.mode !== 'turns') { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  if (state.myTurn) { el.innerHTML = '🎯 <b>내 차례!</b> 내 판에서 숫자를 눌러 호출하세요'; el.classList.add('my'); }
  else { el.innerHTML = '⏳ <b>' + escapeHtml(name) + '</b> 님 차례'; el.classList.remove('my'); }
}
socket.on('player:state', (d) => { refreshCalled(d.called); updateLines(d.lines, d.won); updateReach(d.reach, d.waiting); });
socket.on('player:reach', (d) => {
  if (window.Sound) Sound.reach();
  updateReach(true, d.waiting);
  $('reachBanner').animate([{transform:'scale(1)'},{transform:'scale(1.06)'},{transform:'scale(1)'}], {duration:420});
  toast('⚡ 리치! 한 칸 남았어요!');
});
socket.on('game:winners', (w) => showWinners(w));
socket.on('reaction', (d) => floatEmoji(d.emoji));
socket.on('player:preview', (d) => { state.card = d.card; state.won = false; daubed = new Set(); renderPreview(); $('lobbyCard').classList.remove('hidden'); });
socket.on('game:reset', () => { toast('새 게임을 준비합니다.'); daubed = new Set(); state.won = false; state.myTurn = false; stopCountdown(); show('lobbyView'); $('winBanner').classList.add('hidden'); $('reachBanner').classList.add('hidden'); $('turnBanner').classList.add('hidden'); $('lobbyCard').classList.add('hidden'); });
socket.on('game:end', (d) => { stopCountdown(); state.myTurn = false; $('turnBanner').classList.add('hidden'); if (state.card) document.querySelectorAll('#board .cell').forEach(cellState); if (d.winners && d.winners.length) showWinners(d.winners); });

function showWinners(winners){
  const mine = winners.find(w => w.pid === state.pid);
  if (mine) { $('winBanner').textContent = '🎉 빙고! 우승을 축하합니다!'; $('winBanner').classList.remove('hidden'); fireConfetti(); }
  else { toast('🏆 우승자: ' + winners.map(w=>w.name).join(', ')); }
}

// reconnect: rejoin automatically
socket.on('connect', () => {
  if (state.code && state.pid) {
    socket.emit('player:join', { code: state.code, name: sessionStorage.getItem('bingoName'), pid: state.pid }, (res)=>{
      if (res && res.ok) applyServerState(res);
    });
  }
});

// ---- confetti ----
function fireConfetti(){
  const cv = $('confetti'); cv.style.display='block';
  const ctx = cv.getContext('2d'); cv.width=innerWidth; cv.height=innerHeight;
  const colors=['#ff5e7e','#5b8cff','#ffce54','#2ecc71','#fff'];
  let parts = Array.from({length:140},()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height,
    r:4+Math.random()*6,c:colors[(Math.random()*colors.length)|0],vy:2+Math.random()*4,vx:-2+Math.random()*4,a:1}));
  let t=0;
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.vy+=0.03;ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
      ctx.fillRect(p.x,p.y,p.r,p.r);});
    t++; if (t<240) requestAnimationFrame(loop); else { cv.style.display='none'; }
  })();
}

// ---- emoji reactions ----
$('emojiBar').querySelectorAll('button').forEach(b => {
  b.onclick = () => { socket.emit('player:react', b.textContent); if (window.Sound) Sound.pop(); floatEmoji(b.textContent); };
});
function floatEmoji(emoji){
  const layer = $('reactions');
  const el = document.createElement('div');
  el.className = 'float-emoji'; el.textContent = emoji;
  el.style.left = (6 + Math.random() * 86) + 'vw';
  el.style.fontSize = (24 + Math.random() * 20) + 'px';
  layer.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}
</script>
</body>
</html>
